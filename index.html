<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad ABOZIED | CyberRoute Founder & SOC Analyst</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- الأساسيات والمظاهر --- */
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg-dark: #0b0f1a;
            --card-bg: rgba(18, 25, 45, 0.9);
            --text: #e2e8f0;
            --accent: #ff4f7e;
            --transition-slow: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            --transition-fast: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            height: 100vh;
            scroll-behavior: smooth;
        }

        /* تحسين شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080c18; }
        ::-webkit-scrollbar-thumb { background: #2a3a60; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- تصميم الـ Sections --- */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #1a2645;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            z-index: 2;
        }

        h2 {
            font-size: 2.8rem;
            margin-bottom: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #2a3a60;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition-fast);
            position: relative;
            opacity: 0;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(79, 172, 254, 0.3);
        }

        .glow-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: driftGlow 15s infinite linear;
        }

        /* --- Animations --- */
        @keyframes driftGlow {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            50% { transform: translate(20%, 20%) rotate(180deg); }
            100% { transform: translate(-20%, -20%) rotate(360deg); }
        }

        @keyframes profilePulse {
            0% { box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
            50% { box-shadow: 0 0 50px rgba(79, 172, 254, 0.7); border-color: var(--secondary); }
            100% { box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0px); }
        }

        /* --- تفعيل الحركات --- */
        .reveal-active h2 { animation: fadeInUp 0.8s forwards; }
        .reveal-active .card { animation: fadeInUp 1s forwards; }

        /* 1. COVER PAGE */
        #cover { background: radial-gradient(circle at center, #15203a 0%, #0b0f1a 100%); text-align: center; }
        .cyberroute-logo-cover {
            max-width: 200px; /* تم تكبير الشعار من 120px إلى 200px */
            height: auto;
            border-radius: 12px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(79, 172, 254, 0.15);
            transition: var(--transition-fast);
            filter: drop-shadow(0 0 5px rgba(79, 172, 254, 0.3));
            animation: fadeInUp 1s forwards;
            opacity: 0;
            z-index: 3;
            margin-bottom: 2rem;
        }
        .profile-img-front {
            width: 210px; height: 210px;
            border-radius: 50%;
            border: 5px solid var(--primary);
            object-fit: cover;
            margin-bottom: 1.5rem;
            animation: profilePulse 4s infinite alternate, fadeInUp 1s forwards 0.3s;
            opacity: 0;
            z-index: 3;
        }
        #cover h1 { font-size: 3.8rem; animation: fadeInUp 1s forwards 0.6s; opacity: 0; }
        #cover p { animation: fadeInUp 1s forwards 0.9s; opacity: 0; }

        /* 10. CALL TO ACTION & BUTTONS */
        .btn {
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition-fast);
            opacity: 0;
        }
        .btn-primary { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; box-shadow: 0 5px 15px rgba(79,172,254,0.3); }
        .btn-primary:hover { transform: scale(1.08) translateY(-3px); box-shadow: 0 10px 25px rgba(79, 172, 254, 0.6); }

        .btn-secondary { border: 2px solid var(--primary); color: #fff; }
        .btn-secondary:hover { background: rgba(79, 172, 254, 0.1); border-color: var(--secondary); transform: translateY(-3px); }

        .reveal-active .btn { animation: fadeInUp 0.8s forwards 0.5s; }

        /* للتجاوب مع الموبايل */
        @media (max-width: 768px) {
            section { height: auto; min-height: 100vh; scroll-snap-align: none; padding: 5rem 1rem;}
            body { overflow-y: scroll; scroll-snap-type: none; }
            .cyberroute-logo-cover { max-width: 150px; } /* حجم متجاوب أصغر قليلاً على الموبايل */
        }
    </style>
</head>
<body>

    <section id="cover" class="reveal-section">
        <div class="glow-bg" style="top: 10%; left: 10%;"></div>
        <img src="CyberRoute cover.png" alt="CyberRoute Logo" class="cyberroute-logo-cover">
        <img src="Muhammad Abozied.png" alt="Muhammad Abozied" class="profile-img-front">
        <h1>Muhammad ABOZIED</h1>
        <p style="font-size: 1.6rem; color: var(--primary); letter-spacing: 2px; margin-bottom: 1rem;">SOC Analyst | Cybersecurity Instructor</p>
    </section>

    <section class="reveal-section" id="contact">
        <div class="glow-bg" style="top: 10%; right: 10%;"></div>
        <div class="container" style="text-align: center;">
            <h2>Let's Secure the Future</h2>
            <p style="margin-bottom: 3rem; font-size: 1.3rem; opacity: 0.9;">Ready to collaborate on a security project or training session?</p>
            <div style="display: flex; justify-content: center; gap: 25px; flex-wrap: wrap;">
                
                <a href="mailto:muhammadabozied3@gmail.com?subject=Inquiry from Portfolio" class="btn btn-primary">
                    <i class="fas fa-envelope"></i> Contact Me
                </a>
                
                <a href="https://www.linkedin.com/in/muhammadabozied" target="_blank" class="btn btn-secondary">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
            </div>
        </div>
    </section>

    <section id="thankyou">
        <div class="container" style="text-align: center;">
            <h2>Thank You!</h2>
            <div style="opacity: 0.5; margin-top: 50px;">
                <p>Muhammad ABOZIED | <a href="https://www.linkedin.com/in/muhammadabozied" style="color: inherit; text-decoration: none;">linkedin.com/in/muhammadabozied</a></p>
                <p>Cyber Route © 2026</p>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('.reveal-section, #thankyou');
            const observerOptions = { threshold: 0.2 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('reveal-active');
                    }
                });
            }, observerOptions);
            sections.forEach(section => observer.observe(section));
        });
    </script>
</body>
</html>
